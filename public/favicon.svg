<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="42" fill="#1a1916"/>

  <!-- Bold red C arc, opening to the right (~280°) -->
  <!-- Circle center: (96,96), radius: 62 -->
  <!-- Arc from upper-right to lower-right, going the long way around (counterclockwise) -->
  <path
    d="M 142 57 A 62 62 0 1 0 142 135"
    fill="none"
    stroke="#E8302C"
    stroke-width="36"
    stroke-linecap="round"
  />

  <!-- W in the gap — centered in the opening -->
  <text
    x="157"
    y="99"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="44"
    fill="#f0ece4"
    text-anchor="middle"
    dominant-baseline="middle"
  >W</text>
</svg>
