<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <!-- Gradient matches app: #e63946 red (top) → #fbbf24 yellow → #3b82f6 blue (bottom) -->
    <linearGradient id="cGrad" x1="96" y1="39" x2="96" y2="153" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e63946"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="42" fill="#111111"/>

  <!-- Gradient C arc, opening to the right — center (103,96), shifted right 7px -->
  <path
    d="M 149 57 A 62 62 0 1 0 149 135"
    fill="none"
    stroke="url(#cGrad)"
    stroke-width="36"
    stroke-linecap="round"
  />

  <!-- W shifted right 7px, lowered 10px from geometric center -->
  <text
    x="103"
    y="106"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="70"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
  >W</text>
</svg>
