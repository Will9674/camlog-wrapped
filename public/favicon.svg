<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1a1916"/>

  <!-- Clapperboard body -->
  <rect x="6" y="16" width="20" height="11" rx="1.5" fill="#f0ece4"/>
  <!-- Horizontal lines on body -->
  <line x1="6" y1="19.5" x2="26" y2="19.5" stroke="#1a1916" stroke-width="0.8" opacity="0.25"/>
  <line x1="6" y1="23" x2="26" y2="23" stroke="#1a1916" stroke-width="0.8" opacity="0.25"/>

  <!-- Clapper strip with diagonal stripes -->
  <clipPath id="cl">
    <rect x="6" y="8" width="20" height="8" rx="1.5"/>
  </clipPath>
  <g clip-path="url(#cl)">
    <rect x="6" y="8" width="20" height="8" fill="#f0ece4"/>
    <polygon points="6,8 12,8 6,16" fill="#1a1916"/>
    <polygon points="12,8 18,8 12,16 6,16" fill="#f0ece4"/>
    <polygon points="18,8 24,8 18,16 12,16" fill="#1a1916"/>
    <polygon points="24,8 26,8 26,16 18,16" fill="#f0ece4"/>
    <polygon points="26,8 26,10" fill="#1a1916"/>
  </g>

  <!-- Hinge line between clapper and body -->
  <rect x="6" y="15.5" width="20" height="1" fill="#1a1916" opacity="0.4"/>
</svg>
